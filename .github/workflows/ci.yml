name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PIP_INDEX_URL: https://pypi.org/simple
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pipenv
      - run: pipenv install --dev
      - run: pipenv run pytest tests/ -v --tb=short

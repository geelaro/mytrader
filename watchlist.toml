# 每日回溯配置文件
# active = 实盘/信号执行的策略（每个标的一个）
# monitor = 观察对比的策略（回测用，不执行）

[default]
lookback_years = 3

[defaults]
# 孤儿持仓（不在 watchlist 中的已有持仓）使用的策略
# 只响应卖出信号，不产生买入信号，让持仓自然退出
orphan_strategy = "daily_macd_kdj"

# ---------------------------------------------------------------------------
# 监控标的列表
# ---------------------------------------------------------------------------

[[watchlist]]
symbol = "AAPL"
name = "Apple"
active = "weekly_macd_kdj"
monitor = ["turtle_trading", "enhanced_macd", "bollinger_mean_reversion"]

[[watchlist]]
symbol = "NVDA"
name = "NVIDIA"
active = "weekly_macd_kdj"
monitor = ["turtle_trading", "enhanced_macd"]

[[watchlist]]
symbol = "TSLA"
name = "Tesla"
active = "weekly_macd_kdj"
monitor = ["turtle_trading", "enhanced_macd"]

[[watchlist]]
symbol = "GOOG"
name = "Alphabet"
active = "weekly_macd_kdj"
monitor = ["turtle_trading"]

[[watchlist]]
symbol = "AMZN"
name = "Amazon"
active = "weekly_macd_kdj"
monitor = ["turtle_trading"]

[[watchlist]]
symbol = "MU"
name = "Micron"
active = "weekly_macd_kdj"
monitor = ["turtle_trading", "daily_macd_kdj"]

[[watchlist]]
symbol = "INTC"
name = "Intel"
active = "weekly_macd_kdj"
monitor = ["turtle_trading", "daily_macd_kdj"]

[[watchlist]]
symbol = "ORCL"
name = "Oracle"
active = "weekly_macd_kdj"
monitor = ["turtle_trading"]

[[watchlist]]
symbol = "QQQ"
name = "Nasdaq ETF"
active = "weekly_macd_kdj"
monitor = ["turtle_trading", "enhanced_macd", "donchian_breakout", "daily_macd_kdj"]

[[watchlist]]
symbol = "SPY"
name = "S&P 500 ETF"
active = "weekly_macd_kdj"
monitor = ["turtle_trading"]

# ---------------------------------------------------------------------------
# 策略参数
# ---------------------------------------------------------------------------

[strategy.enhanced_macd]
short_ma = 20
long_ma = 50
macd_fast = 12
macd_slow = 26
macd_signal = 9
rsi_period = 14
rsi_oversold = 30
rsi_overbought = 70
atr_period = 14
trail_atr_mult = 2.0
take_profit_mult = 4.0
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.weekly_macd]
macd_fast = 12
macd_slow = 26
macd_signal = 9

[strategy.weekly_macd_kdj]
macd_fast = 12
macd_slow = 26
macd_signal = 9
kdj_n = 9
kdj_k = 3
kdj_d = 3

[strategy.daily_macd_kdj]
macd_fast = 12
macd_slow = 26
macd_signal = 9
kdj_n = 9
kdj_k = 3
kdj_d = 3
atr_period = 14
trail_atr_mult = 3.0
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.bollinger_mean_reversion]
bb_period = 20
bb_std = 2.0
rsi_period = 14
rsi_oversold = 30.0
rsi_turnup = 3.0
atr_period = 14
atr_stop_mult = 2.0
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.donchian_breakout]
channel_period = 20
atr_period = 14
trail_atr_mult = 3.0
risk_per_trade = 0.02
max_position_pct = 0.95
volume_confirm = true

[strategy.atr_breakout]
ma_period = 20
atr_period = 14
breakout_atr_mult = 2.0
trail_atr_mult = 3.0
risk_per_trade = 0.02
max_position_pct = 0.95
ma_type = "ema"

[strategy.bollinger_squeeze]
bb_period = 20
bb_std = 2.0
squeeze_lookback = 125
squeeze_percentile = 10.0
atr_period = 14
trail_atr_mult = 3.0
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.turtle_trading]
short_period = 20
long_period = 50
channel_period = 20
atr_period = 14
trail_atr_mult = 3.0
risk_per_trade = 0.02
max_position_pct = 0.95

# ---------------------------------------------------------------------------
# 市场状态识别
# ---------------------------------------------------------------------------

[market_state]
# 启用市场状态过滤（true 开启）
enabled = true
# 用于判断市场状态的代理标的（需在 watchlist 或数据源可获取）
proxy_symbol = "SPY"
# 高波动时仓位缩放系数（0.7 = 缩至 70%）
vol_high_scalar = 0.7

# ---------------------------------------------------------------------------
# 风控参数
# ---------------------------------------------------------------------------

[risk]
max_position_pct = 0.30
max_total_exposure_pct = 0.80
max_daily_loss_pct = 0.05
min_order_value = 500.0
max_slippage_pct = 0.02
max_consecutive_losses = 3
max_daily_trades = 5
base_risk_pct = 0.02
vol_sensitivity = 5.0
min_vol_scalar = 0.3

# ---------------------------------------------------------------------------
# 日志
# ---------------------------------------------------------------------------

[log]
level = "INFO"
file_dir = "logs"
max_bytes = 10485760
backup_count = 3

[strategy.trend_follower]
short_ma = 20
long_ma = 50
adx_period = 14
adx_threshold = 20
atr_period = 14
trail_atr_mult = 3.0
risk_per_trade = 0.02
max_position_pct = 0.95

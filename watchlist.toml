[scanner]
lookback_years = 3

# ── 策略实盘安全等级 (P2-1 已知问题) ─────────────────────────────────
# 实盘 daemon 5min 轮询会用"未完成的当日 bar"算指标, 部分策略会产生
# 日内闪烁的假入场单 (盘中触发后盘尾消失, 但订单已成交)。
#
#   ✓ 实盘安全 (日内闪烁极低):
#     - weekly_macd_kdj  (周线信号, 一周 ≤1 次)
#
#   ⚠ 实盘敏感 (日内信号易闪烁, 建议先修 P2-1 再设为 active):
#     - daily_macd_kdj
#     - rsi2_mean_reversion
#     - spy_ma_breakout
#     - bollinger_squeeze / bollinger_mean_reversion (已弃用)
#
# 设为 monitor (仅扫描看信号) 无影响 — 不下单。
# 多因子 / 日内策略上线时必须先做 P2-1 (信号-成交时点对齐)。
# ─────────────────────────────────────────────────────────────────────
#
# ── 已下架: turtle_trading (2026-05-31) ──────────────────────────────
# 因子归因诊断显示 turtle 在当前 watchlist (美股大盘 + 科技股) 上 ALL 11
# 标平均缺口 -9%/年, 不论参数调整。turtle 设计上适合"突破后趋势能持续
# 数月"的资产 (商品/加密/外汇/熊股), 而 2018-2024 美股科技股是"持续单
# 边上涨 + 偶发深度回调"模式, ATR×3 止损总被回调打掉, 卖飞成结构性问题。
#
# [strategy.turtle_trading] 参数节点保留 — 未来加入 GLD/SLV/USO/IBIT/ETHE
# 等商品 / 加密 ETF 时可立即复用。
# ─────────────────────────────────────────────────────────────────────

[orphan]
strategy = "daily_macd_kdj"

[[watchlist]]
symbol = "AAPL"
name = "Apple"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "NVDA"
name = "NVIDIA"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "TSLA"
name = "Tesla"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "GOOG"
name = "Alphabet"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "AMZN"
name = "Amazon"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "MU"
name = "Micron"
active = "weekly_macd_kdj"
monitor = ["daily_macd_kdj", "spy_ma_breakout"]

[[watchlist]]
symbol = "INTC"
name = "Intel"
active = "weekly_macd_kdj"
monitor = ["daily_macd_kdj", "spy_ma_breakout"]

[[watchlist]]
symbol = "ORCL"
name = "Oracle"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "QQQ"
name = "Nasdaq ETF"
active = "weekly_macd_kdj"
monitor = ["donchian_breakout", "daily_macd_kdj", "spy_ma_breakout"]

[[watchlist]]
symbol = "SPY"
name = "S&P 500 ETF"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "SMH"
name = "SMH"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[strategy.weekly_macd]
macd_fast = 12
macd_slow = 26
macd_signal = 9

[strategy.weekly_macd_kdj]
macd_fast = 12
macd_slow = 26
macd_signal = 9
kdj_n = 9
kdj_k = 3
kdj_d = 3

[strategy.daily_macd_kdj]
macd_fast = 12
macd_slow = 26
macd_signal = 9
kdj_n = 9
kdj_k = 3
kdj_d = 3
atr_period = 14
trail_atr_mult = 4
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.donchian_breakout]
channel_period = 20
atr_period = 14
trail_atr_mult = 3
risk_per_trade = 0.02
max_position_pct = 0.95
volume_confirm = true

[strategy.atr_breakout]
ma_period = 20
atr_period = 14
breakout_atr_mult = 2
trail_atr_mult = 3
risk_per_trade = 0.02
max_position_pct = 0.95
ma_type = "ema"

[strategy.turtle_trading]
short_period = 20
long_period = 50
channel_period = 20
atr_period = 14
trail_atr_mult = 3
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.trend_follower]
short_ma = 20
long_ma = 50
adx_period = 14
adx_threshold = 20
atr_period = 14
trail_atr_mult = 3
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.spy_ma_breakout]
ma_period = 200
high_period = 20
atr_period = 14
take_profit_atr_mult = 4
risk_per_trade = 0.02
max_position_pct = 0.95

[market_state]
enabled = true
proxy_symbol = "SPY"
vol_high_scalar = 0.7

[risk]
max_position_pct = 0.3
max_total_exposure_pct = 0.8
max_daily_loss_pct = 0.05
min_order_value = 500
max_slippage_pct = 0.005  # 50bp; raise to 0.01 for illiquid names
max_consecutive_losses = 3
max_daily_trades = 5
base_risk_pct = 0.02
vol_sensitivity = 5
min_vol_scalar = 0.3
max_total_drawdown_pct = 0.3

[log]
level = "INFO"
file_dir = "logs"
max_bytes = 10485760
backup_count = 3

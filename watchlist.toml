[scanner]
lookback_years = 3

[orphan]
strategy = "daily_macd_kdj"

[[watchlist]]
symbol = "AAPL"
name = "Apple"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "NVDA"
name = "NVIDIA"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "TSLA"
name = "Tesla"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "GOOG"
name = "Alphabet"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "AMZN"
name = "Amazon"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "MU"
name = "Micron"
active = "weekly_macd_kdj"
monitor = ["daily_macd_kdj", "spy_ma_breakout"]

[[watchlist]]
symbol = "INTC"
name = "Intel"
active = "weekly_macd_kdj"
monitor = ["daily_macd_kdj", "spy_ma_breakout"]

[[watchlist]]
symbol = "ORCL"
name = "Oracle"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "QQQ"
name = "Nasdaq ETF"
active = "weekly_macd_kdj"
monitor = ["donchian_breakout", "daily_macd_kdj", "spy_ma_breakout"]

[[watchlist]]
symbol = "SPY"
name = "S&P 500 ETF"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "SMH"
name = "SMH"
active = "weekly_macd_kdj"
monitor = ["spy_ma_breakout"]

[[watchlist]]
symbol = "MSFT"
name = "MSFT"
active = "weekly_macd_kdj"
monitor = []

[strategy.weekly_macd]
macd_fast = 12
macd_slow = 26
macd_signal = 9

[strategy.weekly_macd_kdj]
macd_fast = 12
macd_slow = 26
macd_signal = 9
kdj_n = 9
kdj_k = 3
kdj_d = 3

[strategy.daily_macd_kdj]
macd_fast = 12
macd_slow = 26
macd_signal = 9
kdj_n = 9
kdj_k = 3
kdj_d = 3
atr_period = 14
trail_atr_mult = 4
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.donchian_breakout]
channel_period = 20
atr_period = 14
trail_atr_mult = 3
risk_per_trade = 0.02
max_position_pct = 0.95
volume_confirm = true

[strategy.atr_breakout]
ma_period = 20
atr_period = 14
breakout_atr_mult = 2
trail_atr_mult = 3
risk_per_trade = 0.02
max_position_pct = 0.95
ma_type = "ema"

[strategy.turtle_trading]
short_period = 20
long_period = 50
channel_period = 20
atr_period = 14
trail_atr_mult = 3
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.trend_follower]
short_ma = 20
long_ma = 50
adx_period = 14
adx_threshold = 20
atr_period = 14
trail_atr_mult = 3
risk_per_trade = 0.02
max_position_pct = 0.95

[strategy.spy_ma_breakout]
ma_period = 200
high_period = 20
atr_period = 14
take_profit_atr_mult = 4
risk_per_trade = 0.02
max_position_pct = 0.95

[market_state]
enabled = true
proxy_symbol = "SPY"
vol_high_scalar = 0.7

[risk]
max_position_pct = 0.3
max_total_exposure_pct = 0.8
max_daily_loss_pct = 0.05
min_order_value = 500
max_slippage_pct = 0.005
max_consecutive_losses = 3
max_daily_trades = 5
base_risk_pct = 0.02
vol_sensitivity = 5
min_vol_scalar = 0.3
max_total_drawdown_pct = 0.3

[log]
level = "INFO"
file_dir = "logs"
max_bytes = 10485760
backup_count = 3

[alerts]
# RiskAlerter thresholds — consumed by live/risk_alerts.py:AlertConfig.
# Use empty section + defaults if you don't want to override.
enabled = true
risk_light_enabled = true
vix_spike_enabled = true
vix_alert_threshold = 30.0
vix_clear_threshold = 27.0
position_alert_enabled = true
position_distance_alert_pct = 5.0
position_distance_clear_pct = 7.0
